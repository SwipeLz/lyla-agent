; PlatformIO Project Configuration File
;
; Lyla / Taskbot ESP32-S3 BMO firmware.
; Pinmap source of truth: docs/ESP32_INTEGRATION_CONTRACT.md §14
; (also documented in src/config.h).
;
; Build:    pio run
; Upload:   pio run -t upload
; Monitor:  pio device monitor -b 115200

[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder
upload_speed = 921600

build_flags =
    -std=gnu++17
    -Wall
    -Wno-unused-function
    -Wno-deprecated-declarations
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    ; ArduinoJson v7 strict mode: integer overflow guards.
    -DARDUINOJSON_USE_DOUBLE=0
    -DARDUINOJSON_USE_LONG_LONG=1
    ; Firmware version reported in telemetry (Contract §6.3 + §15).
    -DLYLA_FIRMWARE_VERSION=\"0.1.0\"
    ; Protocol version we accept from backend (Contract §15).
    -DLYLA_PROTOCOL_VERSION=\"1\"

build_unflags =
    -std=gnu++11

lib_deps =
    ; --- Offline (Smooth-v5 baseline; do NOT swap libraries) ---
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ILI9341 @ ^1.6.1
    adafruit/Adafruit BusIO @ ^1.16.1
    tockn/MPU6050_tockn @ ^1.5.2

    ; --- Online integration (Phase 11c) ---
    bblanchon/ArduinoJson @ ^7.1.0

    ; SD, SPI, Wire, WiFi, HTTPClient, WiFiClientSecure are bundled with
    ; arduino-esp32. Do not add SDFat or external HTTPS libs; they
    ; conflict with the bundled stack.

