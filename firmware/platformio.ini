; PlatformIO project for Lyla / Taskbot ESP32-S3 BMO firmware.
;
; Target: any ESP32-S3 board with 8 MB PSRAM (mandatory).
; Pinmap source of truth: docs/ESP32_INTEGRATION_CONTRACT.md §14
; (matches taskbot_online_pinmap.md and firmware/src/config.h).
;
; The shared [env] section holds build flags, library pins, and board
; settings so that any board-specific env (devkitc-1, gen4-r8n16, etc.)
; inherits them automatically. Pick your board with:
;   pio run -d firmware -e esp32-s3-devkitc-1
;   pio run -d firmware -e gen4-esp32-r8n16
;   pio run -d firmware -e esp32-s3-wroom-n16r8
;
; If your board isn't listed, copy one of the env blocks below and
; change `board = ...` to your PlatformIO board ID.

[platformio]
default_envs = esp32-s3-devkitc-1

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder
upload_speed = 921600

board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

build_flags =
    -std=gnu++17
    -Wall
    -Wno-unused-function
    -Wno-deprecated-declarations
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    ; ArduinoJson v7 strict mode: integer overflow guards.
    -DARDUINOJSON_USE_DOUBLE=0
    -DARDUINOJSON_USE_LONG_LONG=1
    ; Firmware version reported in telemetry (Contract §6.3 + §15).
    -DLYLA_FIRMWARE_VERSION=\"0.1.0\"
    ; Protocol version we accept from backend (Contract §15).
    -DLYLA_PROTOCOL_VERSION=\"1\"

build_unflags =
    -std=gnu++11

lib_deps =
    ; --- Offline (Smooth-v5 baseline; do NOT swap libraries) ---
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ILI9341 @ ^1.6.1
    adafruit/Adafruit BusIO @ ^1.16.1
    tockn/MPU6050_tockn @ ^1.5.2

    ; --- Online integration (Phase 11c) ---
    bblanchon/ArduinoJson @ ^7.1.0

    ; SD, SPI, Wire, WiFi, HTTPClient, WiFiClientSecure are built into
    ; arduino-esp32 (espressif32 6.7.0). Do not add SDFat or external
    ; HTTPS libs; they conflict with the bundled stack.

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1

[env:gen4-esp32-r8n16]
board = 4d_systems_esp32s3_gen4_r8n16

[env:esp32-s3-wroom-n16r8]
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
